<view class="page">
  <view class="hero">
    <text class="badge">PayPay Mini App</text>
    <text class="title">BentoPay</text>
    <text class="subtitle">Fresh bento, paid in seconds.</text>
    <view class="cone">🍱</view>
  </view>

  <view class="featured">
    <text class="section-title">Today's Bentos</text>
    <view class="cards">
      <view class="card" a:for="{{featured}}" onTap="openMenu" data-id="{{item.id}}">
        <text class="emoji">{{item.emoji}}</text>
        <text class="name">{{item.name}}</text>
        <text class="price">¥{{item.price}}</text>
      </view>
    </view>
  </view>

  <view class="cta" onTap="openMenu">
    <text>See Full Menu</text>
  </view>
</view>
